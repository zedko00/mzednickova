<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5e6d8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#edd5c0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="letterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c97a5a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b5604a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGrad)" />

  <!-- Subtle inner ring -->
  <circle cx="256" cy="256" r="228" fill="none" stroke="#d4956e" stroke-width="3" opacity="0.5"/>

  <!-- Letter M -->
  <path d="M 100 340 L 100 172 L 180 280 L 256 172 L 256 340"
        fill="none"
        stroke="url(#letterGrad)"
        stroke-width="36"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Letter Z -->
  <path d="M 276 172 L 412 172 L 276 340 L 412 340"
        fill="none"
        stroke="url(#letterGrad)"
        stroke-width="36"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Bottom accent line -->
  <rect x="120" y="370" width="272" height="5" rx="2.5" fill="#d4956e" opacity="0.6"/>
</svg>
